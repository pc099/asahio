# ASAHIO LLM Model Profiles
# Each entry defines pricing, latency, quality, and capability metadata.
# The routing engine uses these to make cost-optimal decisions.
# Pricing as of March 2026 — see docs/ASAHIO_Engineering_Changelog_March2026.md

models:
  # ── OpenAI ──────────────────────────────────────────────────────────────

  gpt-4o:
    provider: openai
    api_key_env: OPENAI_API_KEY
    cost_per_1k_input_tokens: 0.0025
    cost_per_1k_output_tokens: 0.010
    avg_latency_ms: 200
    quality_score: 4.6
    max_input_tokens: 128000
